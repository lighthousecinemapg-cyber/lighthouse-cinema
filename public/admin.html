<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staff Login | Lighthouse Cinema</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      color: #F0E9D7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 380px;
      text-align: center;
    }
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      color: #D4AF37;
      margin-bottom: 0.25rem;
    }
    .subtitle { color: #999; font-size: 0.85rem; margin-bottom: 2rem; }
    .field {
      text-align: left;
      margin-bottom: 1.25rem;
    }
    .field label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      margin-bottom: 0.3rem;
      color: #ccc;
    }
    .field input {
      width: 100%;
      background: #0a0a0a;
      border: 1px solid #2a2a2a;
      color: #F0E9D7;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 1rem;
      font-family: inherit;
    }
    .field input:focus { outline: none; border-color: #D4AF37; }
    .btn {
      width: 100%;
      background: #D4AF37;
      color: #0a0a0a;
      border: none;
      padding: 0.85rem;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 0.5rem;
    }
    .btn:hover { background: #e8d48b; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .error-msg {
      color: #f44336;
      font-size: 0.85rem;
      margin-top: 1rem;
      display: none;
    }
    .error-msg.visible { display: block; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">Lighthouse Cinema</div>
    <div class="subtitle">Staff Portal</div>
    <form id="login-form">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" required />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required />
      </div>
      <button type="submit" class="btn" id="login-btn">Sign In</button>
      <div class="error-msg" id="error"></div>
    </form>
  </div>

  <script>
    // Check if already logged in
    fetch('/api/auth', { credentials: 'same-origin' })
      .then(r => r.json())
      .then(d => { if (d.authenticated) window.location.href = '/dashboard.html'; })
      .catch(() => {});

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const err = document.getElementById('error');
      err.className = 'error-msg';
      btn.disabled = true;
      btn.textContent = 'Signing in...';

      try {
        const res = await fetch('/api/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Login failed');
        window.location.href = '/dashboard.html';
      } catch (ex) {
        err.textContent = ex.message;
        err.className = 'error-msg visible';
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
